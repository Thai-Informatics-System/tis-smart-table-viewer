<!-- shared.tisColumnsBtnComponent -->
<button mat-flat-button class="tis-columns-btn" style="background-color: var(--tis-light, #f5f5f5); color: black;" [matMenuTriggerFor]="menu">
    <mat-icon>view_week</mat-icon>
    <span style="display: flex; flex-direction: row;">
        {{selectedTemplate?.name}}
        <mat-icon style="width: 15px; height: 15px; font-size: 20px; line-height: 16px;">arrow_drop_down</mat-icon>
    </span>
</button>
<mat-menu #menu="matMenu" class="tis-columns-btn-mat-menu">
    <button mat-menu-item (click)="selectedTemplate?.id != -1 ? onSelectedTemplate(-1) : null">
        <mat-icon>{{selectedTemplate?.id == -1 ? 'done': ''}}</mat-icon>
        Default
    </button>
    <button mat-menu-item *ngFor="let template of templates" (click)="onSelectedTemplate(template?.id)">
        <mat-icon>{{template?.id == selectedTemplate?.id ? 'done': ''}}</mat-icon>
        <span style="padding-right: 4rem;">{{template.name}}</span>
        <mat-icon style="position: absolute; right: 0;" class="delete-button" (mouseover)="onMouseOverOut($event, `var(--tis-delete-icon, #bb333b)`)" (mouseout)="onMouseOverOut($event, '')" (click)="isDeleteTemplate = true">delete</mat-icon>
        <mat-icon style="position: absolute; right: 2rem;" class="edit-button" (mouseover)="onMouseOverOut($event, `var(--tis-edit-icon, var(--mat-sys-primary, #3838a2))`)" (mouseout)="onMouseOverOut($event, '')" (click)="isEditTemplate = true">edit</mat-icon>
    </button>
    <mat-divider class="tis-mat-divider" style="margin: 0px;"></mat-divider>
    <button mat-menu-item class="tis-create-columns-template-button" style="color: var(--tis-primary, var(--mat-sys-primary, #3838a2));" (click)="createNewTemplateDialog()"><mat-icon style="color: var(--tis-primary, var(--mat-sys-primary, #3838a2));">add</mat-icon> {{t?.tisColumnsBtnComponent?.createNewView}}</button>
</mat-menu>
